<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frog Crossing Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Splash Screen CHANGE HERE TO SEE THE BOARD-->
    <section id="splash-screen" class="screen is-active">
      <h1>Welcome to Frog Crossing</h1>
      <p>Reach the top without getting hit.</p>
      <button id="start-btn">Start Game</button>
    </section>

    <!-- Game Screen -->
    <section id="game-screen" class="screen">
      <div id="stats-bar">
        <span id="lives">Lives: 3</span>
        <span id="crossings">Crossings: 0</span>
        <button id="restart-btn">⟳</button>
      </div>
      <div id="board">
        <div class="lane goal"></div>
        <div class="lane road"><div class="car"></div></div>
        <div class="lane road"></div>
        <div class="lane road"><div class="car"></div></div>
        <div class="lane road"></div>
        <div class="lane road"></div>
        <div class="lane start"><div id="frog"></div></div>
      </div>
    </section>
    <!-- GAME OVER SCREEN -->
    <section id="gameover-screen" class="screen">
      <h2 id="result-title">Game Over</h2>
      <p id="result-detail">You crossed 0 times.</p>
      <button id="play-again-btn">Play again</button>
    </section>

    <script src="game.js"></script>
  </body>
</html>
